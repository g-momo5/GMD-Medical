name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag release (es. v0.1.0). Vuoto = versione da package.json"
        required: false
        type: string
      release_name:
        description: "Nome release (opzionale)"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" && -n "${GITHUB_REF_NAME}" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
          fi

          if [[ -n "${{ inputs.release_name }}" ]]; then
            release_name="${{ inputs.release_name }}"
          else
            release_name="GMD Medical Platform ${tag}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG già presente: gli asset verranno aggiornati."
          else
            echo "Release $TAG non trovata: la creo."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "${GITHUB_SHA}" \
              --title "$RELEASE_NAME" \
              --notes "Automated desktop build."
          fi

  build-and-publish-windows:
    needs: prepare-release
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows MSI + NSIS)
        run: npm run tauri build -- --bundles msi,nsis

      - name: Collect Windows bundles
        id: bundles
        shell: pwsh
        run: |
          $patterns = @(
            "src-tauri/target/release/bundle/msi/*.msi",
            "src-tauri/target/release/bundle/nsis/*.exe"
          )
          $files = @()
          foreach ($pattern in $patterns) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
          }

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Nessun bundle Windows trovato (MSI/NSIS)."
            exit 1
          }

          Write-Host "Asset trovati:"
          $files | ForEach-Object { Write-Host " - $_" }

          "assets<<EOF" >> $env:GITHUB_OUTPUT
          ($files -join "`n") >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Upload / replace release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          ASSETS: ${{ steps.bundles.outputs.assets }}
        run: |
          $files = $env:ASSETS -split "`n" | Where-Object { $_ -and $_.Trim().Length -gt 0 }
          foreach ($file in $files) {
            Write-Host "Upload con sostituzione: $file"
            gh release upload "$env:TAG" "$file" --repo "$env:GITHUB_REPOSITORY" --clobber
          }

      - name: Upload build artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles-${{ needs.prepare-release.outputs.tag }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-and-publish-macos:
    needs: prepare-release
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (macOS APP + DMG)
        run: npm run tauri build -- --bundles app,dmg

      - name: Collect macOS bundles
        id: bundles
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "Nessun bundle macOS trovato (DMG)." >&2
            exit 1
          fi

          echo "Asset trovati:"
          printf ' - %s\n' "${files[@]}"

          {
            echo "assets<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload / replace release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          ASSETS: ${{ steps.bundles.outputs.assets }}
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            echo "Upload con sostituzione: $file"
            gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done <<< "$ASSETS"

      - name: Upload build artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles-${{ needs.prepare-release.outputs.tag }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
