services:
  postgres:
    image: postgres:16
    container_name: gmd-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gmd_platform
      POSTGRES_USER: gmd
      POSTGRES_PASSWORD: gmd_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
